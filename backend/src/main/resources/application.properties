server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expenses_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expenses_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expenses_pass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET:3d8f2a9c7e1b4f6a0d5e8c2b9f3a7e4d1c6b0f5e2a9d8c3b7f1e4a6d0c5b8e2a}
app.jwt.expiration-ms=900000
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}

r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:expense-attachments}
r2.endpoint=${R2_ENDPOINT:}
